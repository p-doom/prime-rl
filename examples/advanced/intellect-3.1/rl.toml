seq_len = 131072

[log]
level = "debug"

[model]
name = "PrimeIntellect/INTELLECT-3-Base"

[weight_broadcast]
type = "nccl"

[deployment]
type = "multi_node"
num_train_nodes = 4
num_infer_nodes = 12

[slurm]
job_name = "swe-qwen30b"

[ckpt]
interval = 100

[wandb]
project = "intellect-3.1"

[trainer.model]
impl = "custom"
attn = "flash_attention_3"
ep = 8
cp = 2
fused_lm_head_token_chunk_size = 1024

[trainer.model.compile]

[trainer.model.ac_offloading]
max_inflight_activations = 5

[trainer.model.ac]
freq = 1

[trainer.optim]
type = "muon"
lr = 1e-6
weight_decay = 0.01

[orchestrator]
batch_size = 2048
oversampling_factor = 2

[[orchestrator.train.env]]
name = "swe"
ratio = 0.3
taskset = { id = "r2e-gym-v1" }
harness = { id = "bash", runtime = { type = "prime", labels = ["intellect-3.1", "swe"] } }

[[orchestrator.train.env]]
name = "deepdive"
ratio = 0.2
taskset = { id = "deepdive-v1" }
harness = { id = "rlm", skills = ["search"], forward_env = ["SERPER_API_KEY"], runtime = { type = "prime", labels = ["intellect-3.1", "deepdive"] } }

[[orchestrator.train.env]]
name = "math"
ratio = 0.3
taskset = { id = "i3_math_v1" }
harness = { id = "null", runtime = { type = "subprocess" } }

[[orchestrator.train.env]]
name = "logic"
ratio = 0.2
taskset = { id = "i3_logic_v1", filter = { max = 0.874 } }
harness = { id = "null", runtime = { type = "subprocess" } }

[[orchestrator.train.env]]
name = "code"
ratio = 0.2
taskset = { id = "i3_code_v1" }
harness = { id = "null", runtime = { type = "subprocess" } }

[[orchestrator.pre_batch_filters]]
type = "zero_advantage"
enforce = true

[orchestrator.eval]
interval = 25

[[orchestrator.eval.env]]
name = "swe-bench-verified"
taskset = { id = "swebench-verified-v1" }
harness = { id = "bash", runtime = { type = "prime", labels = ["intellect-3.1", "swe-bench-verified"] } }

[[orchestrator.eval.env]]
name = "aime2025"
taskset = { id = "aime25-v1" }
harness = { id = "null", runtime = { type = "subprocess" } }

[inference.parallel]
tp = 8

# Model not in MODEL_RENDERER_MAP — opt into DefaultRenderer (apply_chat_template).
[orchestrator.renderer]
name = "default"
