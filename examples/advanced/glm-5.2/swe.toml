seq_len = 131072

[log]
level = "debug"

[wandb]
project = "glm5-pd-disag"

[weight_broadcast]
type = "nccl"
port = 29502
timeout = 12000
quantize_in_weight_transfer = true

[deployment]
type = "multi_node"
num_train_nodes = 16
gpus_per_node = 8
num_infer_replicas = 2

[inference.deployment]
type = "disaggregated"
prefill_nodes_per_replica = 4
decode_nodes_per_replica = 4

[slurm]
job_name = "glm5-pd-disag"


[ckpt]
interval = 100

[trainer]
dist_timeout_seconds = 7200

[trainer.model]
name = "zai-org/GLM-5"
impl = "custom"
attn = "flash_attention_2" # dsa is skipping flash attn anyway
fused_lm_head_token_chunk_size = 2048
optim_cpu_offload = true
ep = 8

[trainer.model.ac]
freq = 1

[trainer.model.compile]

[trainer.model.ac_offloading]
max_inflight_activations = 1

[trainer.ckpt]
skip_optimizer = true
skip_gather_master_weights = true

[trainer.optim]
type = "adamw"
lr = 1e-6
weight_decay = 0.1


[orchestrator]
batch_size = 4096
group_size = 16
oversampling_factor = 3
max_off_policy_steps = 16

[orchestrator.model]
name = "zai-org/GLM-5-FP8"

[orchestrator.eval]
interval = 20

[[orchestrator.eval.env]]
name = "swe-bench-verified"
taskset = { id = "swebench-verified-v1" }
harness = { id = "bash", runtime = { type = "prime", labels = ["glm5-pd-disag", "swe-bench-verified"] } }

[[orchestrator.post_batch_filters]]
type = "gibberish"
enforce = true

[inference]
enable_expert_parallel = true
# we need <0.85 bc glm5 layers are too large for 0.85
gpu_memory_utilization = 0.80
enable_eplb = false
use_deep_gemm = true

[inference.model]
name = "zai-org/GLM-5-FP8"
tool_call_parser = "glm47"
