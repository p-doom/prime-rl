enable_expert_parallel = true
enable_eplb = false
use_deep_gemm = true
gpu_memory_utilization = 0.85

[model]
name = "zai-org/GLM-5-FP8"
tool_call_parser = "auto"
reasoning_parser = "glm45"

[deployment]
type = "disaggregated"
prefill_nodes_per_replica = 4
decode_nodes_per_replica = 2
gpus_per_node = 8

[slurm]
job_name = "glm5"
partition = "cluster"
