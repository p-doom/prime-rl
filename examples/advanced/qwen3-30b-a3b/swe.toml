seq_len = 131072

[log]
level = "debug"

[model]
name = "Qwen/Qwen3-30B-A3B-Thinking-2507"

[weight_broadcast]
type = "nccl"

[deployment]
type = "multi_node"
num_train_nodes = 2
num_infer_nodes = 2

[slurm]
job_name = "swe-qwen30b"

[ckpt]
interval = 100

[wandb]
project = "qwen30b-swe"

[trainer.model]
impl = "custom"
attn = "flash_attention_3"
ep = 8
cp = 2

[trainer.model.compile]

[trainer.model.ac_offloading]
max_inflight_activations = 5

[trainer.model.ac]
freq = 1

[trainer.optim]
type = "adamw"
lr = 1e-6

[orchestrator]
batch_size = 512
oversampling_factor = 2
max_off_policy_steps = 16

[[orchestrator.train.env]]
name = "swe"
taskset = { id = "r2e-gym-v1" }
harness = { id = "bash", runtime = { type = "prime", labels = ["qwen30b-swe", "swe"] } }

[orchestrator.eval]
interval = 25

[[orchestrator.eval.env]]
name = "swe-bench-verified"
taskset = { id = "swebench-verified-v1" }
harness = { id = "bash", runtime = { type = "prime", labels = ["qwen30b-swe", "swe-bench-verified"] } }

[inference.parallel]
tp = 8