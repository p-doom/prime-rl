seq_len = 131072

[log]
level = "debug"

[model]
name = "PrimeIntellect/MiniMax-M2.5-bf16"

[weight_broadcast]
type = "nccl"

[deployment]
type = "multi_node"
num_train_nodes = 4
num_infer_nodes = 12

[slurm]
job_name = "swe-minimax"

[ckpt]
interval = 100

[wandb]
project = "minimax-swe"

[trainer.model]
impl = "custom"
attn = "flash_attention_3"
ep = 8
cp = 4
fused_lm_head_token_chunk_size = 1024

[trainer.model.compile]

[trainer.model.ac_offloading]
max_inflight_activations = 5

[trainer.model.ac]
freq = 1

[trainer.optim]
type = "adamw"
lr = 1e-6
weight_decay = 0.01

[orchestrator]
batch_size = 2048
oversampling_factor = 2
max_off_policy_steps = 16


[[orchestrator.train.env]]
name = "swe"
taskset = { id = "r2e-gym-v1" }
harness = { id = "bash", runtime = { type = "prime", labels = ["minimax-swe", "swe"] } }

[orchestrator.eval]
interval = 25

[[orchestrator.eval.env]]
name = "swe-bench-verified"
taskset = { id = "swebench-verified-v1" }
harness = { id = "bash", runtime = { type = "prime", labels = ["minimax-swe", "swe-bench-verified"] } }

[inference.parallel]
tp = 8

# PrimeIntellect/MiniMax-M2.5-bf16 — template-identical to MiniMaxAI/MiniMax-M2.5 (mapped).
[orchestrator.renderer]
name = "minimax-m2"
