# Hendrycks-math sanity on 2 GPUs (1 trainer + 1 inference) — a single-turn math env meant to
# run long (reward climbs slowly). Dev-sized mirror of examples/basic/hendrycks-sanity.

max_steps = 5000

[deployment]
num_train_gpus = 1
num_infer_gpus = 1

[model]
name = "deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B"

[wandb]
project = "hendrycks-sanity"
name = "hendrycks-sanity"

[orchestrator]
batch_size = 128
group_size = 8
seq_len = 8192

[[orchestrator.train.env]]
name = "hendrycks-math"
taskset = { id = "math-env-v1", dataset_name = "mikasenghaas/Sanity-Test-R1D-1.5B", dataset_subset = "default" }
harness = { id = "null", runtime = { type = "subprocess" } }

[trainer.model]
seq_len = 16384

[inference.model]
max_model_len = 8192

# Model not in MODEL_RENDERER_MAP — opt into DefaultRenderer (apply_chat_template).
[orchestrator.renderer]
name = "default"
reasoning_parser = "think"
