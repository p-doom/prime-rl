# Smoke test for the RL-entrypoint opd algorithm (on-policy distillation).
# The policy inference deployment is launched by the rl entrypoint on GPU 0;
# the frozen reference server is started externally by the test fixture (see
# tests/integration/test_reverse_text_rl_opd.py) on the same GPU. Trainer
# takes GPU 1. Training config mirrors `reverse-text/start.toml`.

max_steps = 15
seq_len = 2048

[weight_broadcast]
# TEMP: NCCL weight broadcast currently crashes the trainer on CI GPU runners
# (trainer exits during NCCL init). Use filesystem transport until the NCCL
# path is fixed. See CI RL integration test failures on main.
type = "filesystem"

[model]
name = "PrimeIntellect/Qwen3-0.6B-Reverse-Text-SFT"

[wandb]
project = "reverse-text-ci"
name = "ci-rl-opd"

[orchestrator]
batch_size = 128
group_size = 16

[orchestrator.algo]
type = "opd"

[orchestrator.algo.teacher]
name = "PrimeIntellect/Qwen3-0.6B-Reverse-Text-RL"
base_url = ["http://localhost:8001/v1"]

[orchestrator.renderer]
name = "prime-qwen3"

[orchestrator.train.sampling]
max_completion_tokens = 128

[[orchestrator.train.env]]
name = "reverse-text"
taskset = { id = "reverse-text-v1" }
harness = { id = "null", runtime = { type = "subprocess" } }

[orchestrator.eval]
interval = 1
num_examples = 16

[orchestrator.eval.sampling]
max_completion_tokens = 128

[[orchestrator.eval.env]]
name = "reverse-text"
taskset = { id = "reverse-text-v1" }
harness = { id = "null", runtime = { type = "subprocess" } }

[trainer.optim]
lr = 3e-6

[inference]
gpu_memory_utilization = 0.4
